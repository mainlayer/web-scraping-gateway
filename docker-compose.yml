version: "3.9"

services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    image: web-scraping-gateway:latest
    container_name: web-scraping-gateway
    restart: unless-stopped
    ports:
      - "${PORT:-8000}:8000"
    environment:
      # Mainlayer
      MAINLAYER_API_KEY: "${MAINLAYER_API_KEY}"
      MAINLAYER_BASE_URL: "${MAINLAYER_BASE_URL:-https://api.mainlayer.xyz}"
      MAINLAYER_TIMEOUT: "${MAINLAYER_TIMEOUT:-5}"
      RESOURCE_ID: "${RESOURCE_ID:-web-scraping-gateway-v1}"
      # Cache
      CACHE_MAX_SIZE: "${CACHE_MAX_SIZE:-500}"
      CACHE_TTL_SECONDS: "${CACHE_TTL_SECONDS:-300}"
      # Rate limiter
      RATE_LIMIT_MAX_REQUESTS: "${RATE_LIMIT_MAX_REQUESTS:-60}"
      RATE_LIMIT_WINDOW_SECONDS: "${RATE_LIMIT_WINDOW_SECONDS:-60}"
      # Server
      HOST: "0.0.0.0"
      PORT: "8000"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    env_file:
      - .env
